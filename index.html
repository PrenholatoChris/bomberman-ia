<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bomberman Genetic AI</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #222;
      color: white;
      font-family: sans-serif;
      flex-direction: column;
    }

    canvas {
      background-color: #333;
      border: 4px solid #555;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="gameCanvas" width="600" height="520"></canvas>
    <div class="controls">
      <button id="btnPlay">Play Mode</button>
      <button id="btnTrain">Train AI Mode</button>
      <button id="btnStropTraining">Stop Training</button>
    </div>
    <div style="margin-top: 15px;">
      <label for="speedInput">Game Speed:</label>
      <input type="number" id="speedInput" value="1" min="0.1" max="100" step="0.5" style="width: 60px;">
    </div>
    <div id="stats" style="margin-top:20px; text-align:center; display:none;">
      <h3 style="margin:5px 0">Generation: <span id="genText">0</span></h3>
      <p style="margin:5px 0">Progress: <span id="progText">0/20</span></p>
      <p style="margin:5px 0">Best Fitness: <span id="fitText">0</span></p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
